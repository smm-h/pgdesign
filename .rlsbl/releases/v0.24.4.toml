# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "patch"
# Short description of this release (required)
description = "Idempotent mode now emits ADD COLUMN IF NOT EXISTS guards for every column."
# Optional context explaining why these changes were made
context = "Previously, idempotent mode generated CREATE TABLE IF NOT EXISTS but plain ADD COLUMN for alter statements, causing silent column drift on re-apply. All column additions now use IF NOT EXISTS guards."
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
# Set to true to generate a blog post for this release
# blog = false
include = ["go", "npm", "pypi"]
exclude = []
