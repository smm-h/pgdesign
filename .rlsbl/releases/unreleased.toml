# Version bump type: patch, minor, or major
bump = "minor"
# Short description of this release (required)
description = "SQL parser foundation, VIRTUAL generated columns, PGVersion fix, go-pgquery integration"
# Optional context explaining why these changes were made
context = """
Foundation release for the SQL parser infrastructure. The sqlexpr expression parser \
gained comparison operators, IS NULL, IN, BETWEEN, LIKE, and arithmetic operators. \
The wasilibs/go-pgquery WASM-based PostgreSQL parser replaces naive statement splitting \
in migrations and regex-based index parsing in introspect. PGVersion is now properly \
threaded through to risk classification. VIRTUAL generated columns (PG 18+) are fully \
supported across parse, model, DDL, migration, introspect, and diff. Silent failures \
in validate and codegen are now surfaced as diagnostics. The generate.Generate function \
signature changed to return diagnostics alongside the output."""
include = ["go", "npm", "pypi"]
