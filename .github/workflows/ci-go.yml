name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Per-SHA group: re-runs of the same commit dedupe, but a new commit never
# cancels an earlier commit's in-flight run (release CI conclusions stay intact).
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGDESIGN_DB: postgres://test:test@localhost:5432/postgres?sslmode=disable
      PGDESIGN_REQUIRE_DB: "1"

    steps:
      - uses: actions/checkout@v6

      # Install pg_partman inside the postgres service container.
      # The official postgres:17 image is Debian-based and includes the
      # PostgreSQL apt repository with pg_partman available as a package.
      - name: Install pg_partman extension
        run: |
          docker exec ${{ job.services.postgres.id }} bash -c \
            "apt-get update && apt-get install -y --no-install-recommends postgresql-17-partman && rm -rf /var/lib/apt/lists/*"
          # Verify the extension is loadable.
          PGPASSWORD=test psql -h localhost -U test -d postgres -c "SELECT name, default_version FROM pg_available_extensions WHERE name = 'pg_partman';"

      # go.mod: go 1.26.3
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./... -race -short -timeout=10m
